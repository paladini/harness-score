<svg width="860" height="240" viewBox="0 0 860 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Harness Score maturity L2 Guided">
  <title>Harness Score — L2 Guided</title>
  <defs>
    <linearGradient id="hs-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14232f"/>
      <stop offset="1" stop-color="#081117"/>
    </linearGradient>
    <linearGradient id="hs-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ce3a3"/>
      <stop offset="1" stop-color="#16a877"/>
    </linearGradient>
    <clipPath id="hs-card"><rect x="0" y="0" width="860" height="240" rx="30"/></clipPath>
  </defs>

  <rect x="0" y="0" width="860" height="240" rx="30" fill="url(#hs-tile)"/>
  <g clip-path="url(#hs-card)">
    <ellipse cx="430" cy="18" rx="440" ry="150" fill="#ffffff" opacity="0.045"/>
  </g>
  <rect x="1" y="1" width="858" height="238" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>

  <!-- level meter -->
    <rect x="48" y="136" width="24" height="40" rx="12" fill="url(#hs-fill)"/>
    <rect x="84" y="118" width="24" height="58" rx="12" fill="url(#hs-fill)"/>
    <rect x="120" y="100" width="24" height="76" rx="12" fill="url(#hs-fill)"/>
    <rect x="156" y="82" width="24" height="94" rx="12" fill="#1e2f3a"/>
    <rect x="192" y="64" width="24" height="112" rx="12" fill="#1e2f3a"/>

  <!-- text -->
  <text x="260" y="70" textLength="203.2" lengthAdjust="spacingAndGlyphs" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="4" fill="#3ce3a3">HARNESS SCORE</text>
  <text x="260" y="163" textLength="105.4" lengthAdjust="spacingAndGlyphs" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="#3ce3a3">L2</text>
  <text x="396" y="163" textLength="114.9" lengthAdjust="spacingAndGlyphs" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#f2f6f4">Guided</text>
  <text x="260" y="212" textLength="239.5" lengthAdjust="spacingAndGlyphs" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="500" fill="#7c8a92">Scoped rules, skills, hygiene</text>
  <text x="820" y="212" text-anchor="end" textLength="250.8" lengthAdjust="spacingAndGlyphs" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="1" fill="#7c8a92">paladini.github.io/harness-score</text>
</svg>
