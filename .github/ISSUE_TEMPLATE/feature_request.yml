name: "Feature request"
description: "Propose a feature for the CLI, guide, plugin, or GitHub Action — not a new/changed/removed check (use the Check change template for those)."
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proposing a new check, or a change to an existing one's points or
        logic? Use the **Check change** template instead — it asks for the
        dimension/points/fixture-impact details that kind of change needs.

        Check the [ROADMAP](../../ROADMAP.md) first — your idea might
        already be planned.
  - type: textarea
    id: problem
    attributes:
      label: What's missing or wrong today
      description: What behavior would you like to see instead?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
      description: What would it do, and where does it live (CLI flag, plugin, Action, docs)?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
