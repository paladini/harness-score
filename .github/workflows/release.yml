name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) — no token/secret needed
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # Trusted Publishing needs a recent npm CLI
      - run: npm ci
      - run: npm run build -w harness-score
      - name: Publish to npmjs.org (Trusted Publishing / OIDC)
        run: npm publish -w harness-score --provenance --access public

  github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@paladini'
      - run: npm ci
      - run: npm run build -w harness-score
      - name: Publish to GitHub Packages as @paladini/harness-score
        run: |
          npm pkg set name=@paladini/harness-score -w packages/cli
          npm publish -w packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Publish to JSR
        working-directory: packages/cli
        run: npx -y jsr publish --allow-slow-types
